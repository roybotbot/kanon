id: upload_image_claude_ai
name: Upload an Image on Claude.ai
description: Add an image to a conversation in the claude.ai chat interface.
steps:
- Navigate to claude.ai
- Upload an image like you would a file, or drag and drop an image directly into the
  chat window
content_block: Users can provide images to Claude on claude.ai by uploading them as
  files or by dragging and dropping them directly into the chat window. Up to 20 images
  can be included in a single request on claude.ai.
