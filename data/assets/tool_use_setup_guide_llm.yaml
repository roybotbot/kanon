content: "# Setup Guide: Tool Use with Claude API\n\n**Audience:** Backend Engineers\
  \ (Enterprise)\n**Difficulty:** Intermediate\n**Assumed Knowledge:** API authentication\
  \ with Claude\n\n---\n\n## Overview\n\nTool use enables Claude to interact with\
  \ external functions and APIs that you define. Rather than responding purely with\
  \ text, Claude can identify when a user request requires calling an external function,\
  \ return a structured `tool_use` response block, and allow your backend to execute\
  \ the function and return results back into the conversation.\n\nThis guide walks\
  \ through configuring tool definitions, setting appropriate system instructions,\
  \ and verifying that your integration handles the tool call lifecycle correctly.\n\
  \n**Key concepts:**\n\n- You define the tools \u2014 Claude decides when to use\
  \ them.\n- Tool definitions include a name, description, and JSON Schema for inputs.\n\
  - The conversation loop must handle `tool_use` response blocks and return results\
  \ via a `tool_result` message.\n\n---\n\n## Prerequisites\n\nBefore beginning, confirm\
  \ the following are in place:\n\n| Requirement | Details |\n|---|---|\n| **API Authentication**\
  \ | You have valid credentials and can successfully authenticate against the Claude\
  \ API. |\n| **System Prompt Access** | Your API request structure supports a `system`\
  \ parameter. |\n| **JSON Schema Familiarity** | You can define input schemas using\
  \ JSON Schema syntax, as this is required for tool definitions. |\n| **Backend Execution\
  \ Environment** | Your application can execute arbitrary functions/calls and re-inject\
  \ results into an API request. |\n\n> **Note:** Tool use depends on both `api_authentication`\
  \ and `system_prompt` being operational. Do not proceed if either prerequisite is\
  \ unverified.\n\n---\n\n## Procedure\n\n### Step 1: Write a System Prompt\n\nConfigure\
  \ a system prompt to establish Claude's role and behavioral constraints within your\
  \ application context. A focused, specific system prompt improves tool-use accuracy.\n\
  \n1. Write a system prompt that clearly defines:\n   - Claude's role in your application\n\
  \   - Any constraints on behavior or scope\n   - Preferred output format and tone\n\
  2. Add a `system` parameter to your API request body containing this prompt.\n3.\
  \ Keep the system prompt focused \u2014 avoid combining unrelated instructions.\n\
  \n**Checklist:**\n- [ ] Role and purpose are clearly stated\n- [ ] Constraints are\
  \ explicit\n- [ ] System prompt is included in the API request\n\n---\n\n### Step\
  \ 2: Define Your Tools\n\nEach tool must have three components: a **name**, a **description**,\
  \ and an **input schema**.\n\n1. **Define the tool name and description**\n   -\
  \ The name should be a concise identifier for the function.\n   - The description\
  \ should explain what the tool does and when Claude should use it. This is critical\
  \ \u2014 Claude relies on the description to decide whether to invoke the tool.\n\
  \n2. **Specify the input schema using JSON Schema**\n   - Define all parameters\
  \ the tool accepts, including types and which are required.\n   - Be precise; ambiguous\
  \ schemas can produce malformed tool calls.\n\n3. **Register the tool in the API\
  \ request**\n   - Add a `tools` array to your API request body.\n   - Each entry\
  \ in the array should contain the `name`, `description`, and `input_schema` fields.\n\
  \n**Checklist:**\n- [ ] Each tool has a unique, descriptive name\n- [ ] Descriptions\
  \ clearly communicate intended use\n- [ ] Input schemas cover all required and optional\
  \ parameters\n- [ ] `tools` array is present in the API request\n\n---\n\n### Step\
  \ 3: Handle the `tool_use` Response Block\n\nWhen Claude determines a tool should\
  \ be called, it returns a `tool_use` content block in its response rather than a\
  \ plain text reply.\n\n1. **Detect the `tool_use` content block** in the API response.\n\
  2. **Extract the tool name and input arguments** from the block.\n3. **Execute the\
  \ corresponding function** in your backend using the provided arguments.\n4. **Return\
  \ the result** to the conversation by sending a `tool_result` message back to the\
  \ API.\n5. **Continue the conversation loop** \u2014 Claude will process the tool\
  \ result and generate its final response.\n\n**Checklist:**\n- [ ] Response parsing\
  \ handles `tool_use` blocks\n- [ ] Tool execution logic is mapped to tool names\n\
  - [ ] Results are formatted and returned as `tool_result` messages\n- [ ] Conversation\
  \ loop continues after tool result is submitted\n\n---\n\n## Verification\n\nUse\
  \ the following checks to confirm your tool use integration is functioning correctly\
  \ end-to-end:\n\n| Check | Expected Outcome |\n|---|---|\n| Send a request that\
  \ clearly requires a tool | Claude returns a `tool_use` content block, not a plain\
  \ text response |\n| Inspect the `tool_use` block | Contains the correct tool name\
  \ and well-formed input arguments matching your schema |\n| Submit a `tool_result`\
  \ message | Claude processes the result and returns a coherent final response |\n\
  | Send a request that does NOT require a tool | Claude responds with plain text\
  \ only \u2014 no spurious `tool_use` blocks |\n| Test with an ambiguous request\
  \ | Verify Claude's tool selection aligns with your description intent |\n\nIf all\
  \ checks pass, your integration is correctly handling the full tool call lifecycle.\n\
  \n---\n\n## Troubleshooting\n\n### Claude is not calling the tool when expected\n\
  \n- **Review the tool description.** Claude uses the description to determine relevance.\
  \ If the description is vague or incomplete, Claude may not recognize when the tool\
  \ applies. Make it explicit about the scenarios in which the tool should be used.\n\
  - **Check the system prompt for conflicts.** If the system prompt contains constraints\
  \ that inadvertently restrict tool use, Claude may suppress tool calls. Review for\
  \ contradictory instructions.\n\n---\n\n### Claude is calling the tool when it should\
  \ not be\n\n- **Tighten the tool description.** Overly broad descriptions can cause\
  \ Claude to invoke tools unnecessarily. Scope the description to specific, intended\
  \ use cases.\n- **Add explicit guidance in the system prompt** clarifying when tools\
  \ should and should not be used.\n\n---\n\n### The `tool_use` block contains unexpected\
  \ or malformed inputs\n\n- **Review your `input_schema` definition.** Ambiguous\
  \ or loosely typed schemas can result in Claude generating inputs that do not match\
  \ your expected format. Add stricter type constraints and mark fields as required\
  \ where appropriate.\n\n---\n\n### Tool results are not being processed by Claude\n\
  \n- **Verify the `tool_result` message format.** Ensure the result is being returned\
  \ as a properly structured message in the conversation. If the format is incorrect,\
  \ Claude may not recognize it as a tool response.\n- **Check the conversation turn\
  \ order.** Tool results must be submitted before Claude can generate a follow-up\
  \ response. Verify your conversation loop is sequencing messages correctly.\n\n\
  ---\n\n### Authentication errors during tool use requests\n\n- **Confirm prerequisites\
  \ are met.** Tool use requires API authentication to be fully functional. Re-verify\
  \ your credentials and authentication flow before debugging tool-specific behavior.\n\
  \n---\n\n*For additional coverage of advanced tool use patterns, consider adding\
  \ further entities to your knowledge graph.*"
