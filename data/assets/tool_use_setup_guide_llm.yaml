content: "# Tool Use Setup Guide\n\n**Audience:** Enterprise Developer \u2014 Backend\
  \ engineers integrating Claude via the API\n**Topic:** Enabling Claude to call external\
  \ functions and APIs\n\n---\n\n## Overview\n\nTool use allows Claude to invoke external\
  \ functions and APIs that you define as part of your integration. Rather than generating\
  \ a plain text response, Claude can recognize when a user's request requires external\
  \ data or computation, emit a structured `tool_use` response block identifying which\
  \ function to call and with what arguments, and then incorporate the result into\
  \ a final answer once your backend executes the function and returns the output.\n\
  \nThis capability is useful for scenarios such as fetching live data, querying internal\
  \ databases, triggering workflows, or calling third-party APIs \u2014 all orchestrated\
  \ through a single conversational interface.\n\n**High-level flow:**\n\n```\nClient\
  \ \u2192 API Request (with tool definitions) \u2192 Claude\nClaude \u2192 tool_use\
  \ block (function name + arguments)\nClient \u2192 executes function \u2192 returns\
  \ tool_result\nClaude \u2192 final response incorporating tool output\n```\n\n---\n\
  \n## Prerequisites\n\nBefore configuring tool use, ensure the following are in place:\n\
  \n| Requirement | Details |\n|---|---|\n| **API Authentication** (`api_authentication`)\
  \ | You must have a valid Anthropic API key and an authenticated HTTP client configured.\
  \ Tool use is not available to unauthenticated requests. |\n| **System Prompt**\
  \ (`system_prompt`) | A system prompt should be defined to establish Claude's role,\
  \ constraints, and behavior. This is especially important when tools are present,\
  \ as it helps Claude understand when and how to invoke them. |\n| **JSON Schema\
  \ familiarity** | Tool input schemas are defined using [JSON Schema](https://json-schema.org/).\
  \ You should be comfortable writing basic JSON Schema definitions (`type`, `properties`,\
  \ `required`, etc.). |\n| **Backend execution environment** | Your application must\
  \ be capable of receiving the `tool_use` block, routing the call to the appropriate\
  \ function, and returning results to the API in a follow-up request. |\n\n> **Note:**\
  \ If API authentication is not yet configured, complete that setup before proceeding.\
  \ Attempting tool use without a valid API key will result in `401 Unauthorized`\
  \ errors.\n\n---\n\n## Procedure\n\n### Step 1 \u2014 Write a System Prompt\n\n\
  Add a `system` parameter to your API request that establishes Claude's role and\
  \ clarifies the tools available to it. Keep the prompt focused and specific.\n\n\
  ```json\n{\n  \"system\": \"You are a backend assistant for an inventory management\
  \ system. Use the provided tools to look up product stock levels and order history.\
  \ Only call a tool when the user's request requires real-time data.\"\n}\n```\n\n\
  **Guidance:**\n- State Claude's role clearly.\n- Indicate the purpose of the tools\
  \ so Claude can make informed decisions about when to invoke them.\n- Define any\
  \ constraints (e.g., \"Do not call tools for general knowledge questions\").\n\n\
  ---\n\n### Step 2 \u2014 Define Tool Schemas\n\nEach tool requires three fields:\
  \ `name`, `description`, and `input_schema`. Add these to a `tools` array in your\
  \ API request body.\n\n```json\n{\n  \"tools\": [\n    {\n      \"name\": \"get_stock_level\"\
  ,\n      \"description\": \"Returns the current stock quantity for a given product\
  \ SKU.\",\n      \"input_schema\": {\n        \"type\": \"object\",\n        \"\
  properties\": {\n          \"sku\": {\n            \"type\": \"string\",\n     \
  \       \"description\": \"The product SKU identifier, e.g. 'WIDGET-42'.\"\n   \
  \       }\n        },\n        \"required\": [\"sku\"]\n      }\n    }\n  ]\n}\n\
  ```\n\n**Guidance:**\n- **`name`** \u2014 Use a concise, snake_case identifier that\
  \ matches your internal function name where possible.\n- **`description`** \u2014\
  \ Write this for Claude, not for humans reading the code. Claude uses this description\
  \ to decide whether to invoke the tool, so be precise about what the tool does and\
  \ when it is appropriate to call it.\n- **`input_schema`** \u2014 Use standard JSON\
  \ Schema. Mark all required fields explicitly in the `required` array.\n\n---\n\n\
  ### Step 3 \u2014 Send the Initial API Request\n\nCombine the system prompt, tool\
  \ definitions, and the user's message in a single request.\n\n```json\nPOST https://api.anthropic.com/v1/messages\n\
  \n{\n  \"model\": \"claude-opus-4-5\",\n  \"max_tokens\": 1024,\n  \"system\": \"\
  You are a backend assistant for an inventory management system...\",\n  \"tools\"\
  : [ /* tool definitions from Step 2 */ ],\n  \"messages\": [\n    {\n      \"role\"\
  : \"user\",\n      \"content\": \"How many units of WIDGET-42 do we have in stock?\"\
  \n    }\n  ]\n}\n```\n\n---\n\n### Step 4 \u2014 Handle the `tool_use` Response\
  \ Block\n\nIf Claude determines a tool call is needed, it returns a response with\
  \ `stop_reason: \"tool_use\"` and a `content` array containing a `tool_use` block.\n\
  \n**Example response:**\n\n```json\n{\n  \"id\": \"msg_01XFDUDYJgAACehvsiVbJ9Er\"\
  ,\n  \"type\": \"message\",\n  \"role\": \"assistant\",\n  \"stop_reason\": \"tool_use\"\
  ,\n  \"content\": [\n    {\n      \"type\": \"tool_use\",\n      \"id\": \"toolu_01A09q90qw90lq917835lq9\"\
  ,\n      \"name\": \"get_stock_level\",\n      \"input\": {\n        \"sku\": \"\
  WIDGET-42\"\n      }\n    }\n  ]\n}\n```\n\n**Your application must:**\n1. Detect\
  \ `stop_reason === \"tool_use\"` in the response.\n2. Extract the `name` and `input`\
  \ fields from the `tool_use` block.\n3. Route the call to the appropriate internal\
  \ function.\n4. Capture the function's return value.\n\n---\n\n### Step 5 \u2014\
  \ Return the Tool Result\n\nSend a follow-up API request that includes the full\
  \ conversation history plus a `tool_result` message.\n\n```json\n{\n  \"model\"\
  : \"claude-opus-4-5\",\n  \"max_tokens\": 1024,\n  \"system\": \"...\",\n  \"tools\"\
  : [ /* same tool definitions */ ],\n  \"messages\": [\n    {\n      \"role\": \"\
  user\",\n      \"content\": \"How many units of WIDGET-42 do we have in stock?\"\
  \n    },\n    {\n      \"role\": \"assistant\",\n      \"content\": [\n        {\n\
  \          \"type\": \"tool_use\",\n          \"id\": \"toolu_01A09q90qw90lq917835lq9\"\
  ,\n          \"name\": \"get_stock_level\",\n          \"input\": { \"sku\": \"\
  WIDGET-42\" }\n        }\n      ]\n    },\n    {\n      \"role\": \"user\",\n  \
  \    \"content\": [\n        {\n          \"type\": \"tool_result\",\n         \
  \ \"tool_use_id\": \"toolu_01A09q90qw90lq917835lq9\",\n          \"content\": \"\
  342\"\n        }\n      ]\n    }\n  ]\n}\n```\n\n> **Important:** The `tool_use_id`\
  \ in your `tool_result` must exactly match the `id` field from the `tool_use` block.\
  \ A mismatch will cause an API error.\n\n---\n\n### Step 6 \u2014 Process Claude's\
  \ Final Response\n\nClaude will now return a standard `stop_reason: \"end_turn\"\
  ` response incorporating the tool result.\n\n```json\n{\n  \"stop_reason\": \"end_turn\"\
  ,\n  \"content\": [\n    {\n      \"type\": \"text\",\n      \"text\": \"There are\
  \ currently 342 units of WIDGET-42 in stock.\"\n    }\n  ]\n}\n```\n\nExtract the\
  \ `text` content and return it to your user or downstream system as needed.\n\n\
  ---\n\n## Verification\n\nUse the following checklist to confirm your tool use integration\
  \ is working correctly end-to-end:\n\n- [ ] **Tool definition accepted** \u2014\
  \ The initial API request returns a `200 OK` with no schema validation errors. A\
  \ malformed `input_schema` will result in a `400 Bad Request`.\n- [ ] **`tool_use`\
  \ block triggered** \u2014 Given a user query clearly requiring the tool, the response\
  \ contains `\"stop_reason\": \"tool_use\"` and a well-formed `tool_use` content\
  \ block with correct `name` and `input` values.\n- [ ] **Arguments are correctly\
  \ typed** \u2014 The `input` object conforms to your defined JSON Schema (correct\
  \ types, required fields present).\n- [ ] **`tool_result` accepted** \u2014 The\
  \ follow-up request with the `tool_result` message returns `200 OK` without errors.\n\
  - [ ] **Final response is coherent** \u2014 Claude's final answer correctly incorporates\
  \ the tool result and responds to the user's original intent.\n- [ ] **Tool not\
  \ called unnecessarily** \u2014 For a query that does not require external data\
  \ (e.g., \"What is 10 + 5?\"), Claude responds directly without emitting a `tool_use`\
  \ block.\n\n---\n\n## Troubleshooting\n\n### `400 Bad Request` \u2014 Invalid tool\
  \ definition\n\n**Symptom:** API returns a 400 error on the initial request.\n\n\
  **Likely causes:**\n- `input_schema` is missing the `\"type\": \"object\"` field\
  \ at the top level.\n- A field listed in `required` is not defined under `properties`.\n\
  - `name` contains spaces or special characters (use `snake_case` only).\n\n**Resolution:**\
  \ Validate your `input_schema` independently against the JSON Schema specification\
  \ before including it in the request. Ensure `name` matches the pattern `[a-zA-Z_][a-zA-Z0-9_]*`.\n\
  \n---\n\n### Claude never calls the tool\n\n**Symptom:** Claude always responds\
  \ with plain text even for queries that should trigger a tool call.\n\n**Likely\
  \ causes:**\n- The tool `description` is vague or does not match the user's phrasing.\n\
  - The system prompt is discouraging tool use (e.g., overly restrictive instructions).\n\
  - The user's query does not clearly imply a need for the tool.\n\n**Resolution:**\n\
  - Rewrite the `description` to be explicit about what data the tool returns and\
  \ when it should be used.\n- Review your system prompt for language that might suppress\
  \ tool calls.\n- Test with a query that directly mirrors the tool description.\n\
  \n---\n\n### `tool_use_id` mismatch error\n\n**Symptom:** The follow-up request\
  \ with `tool_result` returns an error about an unrecognized tool use ID.\n\n**Likely\
  \ cause:** The `tool_use_id` in the `tool_result` block does not exactly match the\
  \ `id` from the `tool_use` block in Claude's response.\n\n**Resolution:** Store\
  \ the entire `tool_use` content block from Claude's response and reference `block.id`\
  \ directly when constructing the `tool_result`. Do not hardcode or modify the ID.\n\
  \n---\n\n### Claude calls a tool with incorrect or missing arguments\n\n**Symptom:**\
  \ The `input` object in the `tool_use` block is missing required fields or contains\
  \ wrong types.\n\n**Likely cause:** The `input_schema` `description` fields are\
  \ insufficient for Claude to understand what values to supply.\n\n**Resolution:**\
  \ Add more descriptive `description` values to each property in your schema. Include\
  \ examples where helpful (e.g., `\"The product SKU, e.g. 'WIDGET-42'\"`). Ensure\
  \ `required` accurately reflects mandatory parameters.\n\n---\n\n### Tool result\
  \ not reflected in final response\n\n**Symptom:** Claude's final answer ignores\
  \ or contradicts the value returned in `tool_result`.\n\n**Likely cause:** The `tool_result`\
  \ `content` field is empty, malformed, or not included in the correct message in\
  \ the conversation history.\n\n**Resolution:** Ensure the `tool_result` message\
  \ is appended to the `messages` array as a `user` role message immediately following\
  \ the assistant's `tool_use` message. Verify the `content` field contains a non-empty\
  \ string or structured content block.\n\n---\n\n*For additional reference, consult\
  \ the Anthropic API documentation on the Messages endpoint and the official JSON\
  \ Schema specification.*"
