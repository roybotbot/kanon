content: |
  # Tool Use Facilitator Guide

  ## Overview
  This guide covers how to configure and use Claude's tool use feature.
  Tool use allows Claude to call external functions you define.

  ## Prerequisites
  - API authentication configured
  - Familiarity with JSON Schema

  ## Key Concepts
  Tool use enables Claude to interact with external systems by calling
  functions you define. You provide tool definitions with names, descriptions,
  and input schemas. Claude decides when to use a tool and returns a
  tool_use response block.

  ## Procedure
  1. Define the tool name and description
  2. Specify the input schema using JSON Schema
  3. Register the tool in the API request tools array
  4. Handle the tool_use response block

  ## Verification
  - Send a request with a tool definition
  - Verify Claude returns a tool_use content block
  - Confirm the input matches your schema

  ## Troubleshooting
  - If Claude doesn't use the tool, check the tool description
  - Ensure input_schema is valid JSON Schema
  - Verify the tool is in the tools array
